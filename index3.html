<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sonali 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #fff0f5, #e6ccff);
  overflow-x: hidden;
  color: #333;
}

/* Floating particles */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: float 8s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity:0; }
  50% { opacity:1; }
  100% { transform: translateY(-10vh); opacity:0; }
}

/* Welcome */
#welcome {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

#typing {
  font-size: 2rem;
  border-right: 3px solid #999;
  white-space: nowrap;
  overflow: hidden;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Button */
.btn {
  margin-top:25px;
  padding:14px 30px;
  border:none;
  border-radius:40px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  color:#333;
  font-weight:600;
  cursor:pointer;
  transition:0.4s;
  box-shadow: 0 0 20px rgba(255,192,203,0.6);
}
.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px rgba(255,105,180,0.8);
}

/* Main */
#main {
  display:none;
  text-align:center;
  padding:40px 20px;
}

/* Title */
.title {
  font-size:3rem;
  font-family: 'Playfair Display', serif;
  background: linear-gradient(45deg, gold, pink);
  -webkit-background-clip: text;
  color: transparent;
  animation: fade 2s ease;
}

/* Card */
.card {
  max-width:600px;
  margin:30px auto;
  padding:25px;
  border-radius:20px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  transition: transform 0.3s;
  line-height:1.6;
}

/* Slider */
.slider {
  display:flex;
  overflow:hidden;
  max-width:600px;
  margin:30px auto;
  border-radius:20px;
}
.slide {
  min-width:100%;
}
.slide img {
  width:100%;
  border-radius:20px;
}

/* Surprise */
#surpriseText {
  display:none;
  font-size:1.6rem;
  margin-top:20px;
  color:#d63384;
  font-weight:600;
  animation: fade 1.5s ease;
}

/* Footer */
footer {
  margin-top:50px;
  font-size:1.1rem;
  opacity:0.8;
}

@keyframes fade {
  from {opacity:0; transform:scale(0.8);}
  to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<section id="welcome">
  <div id="typing"></div>
  <button class="btn" onclick="start()">Open Your Surprise 🎁</button>
</section>

<section id="main">

  <h1 class="title">Happy Birthday Sonali 🎂✨</h1>

  <div class="card" id="card">
    You are not just special, you are unforgettable.<br><br>
    Your smile makes everything brighter,<br>
    and your presence makes life beautiful.<br><br>
    I feel really lucky to have you in my life 💖
  </div>

  <div class="slider" id="slider">
    <div class="slide"><img src="https://picsum.photos/600/400?1"></div>
    <div class="slide"><img src="https://picsum.photos/600/400?2"></div>
    <div class="slide"><img src="https://picsum.photos/600/400?3"></div>
  </div>

  <button class="btn" onclick="surprise()">Click for a Surprise 💝</button>

  <div id="surpriseText">You mean more than words can say ❤️</div>

  <footer>Made with ❤️ just for you, Sonali</footer>

</section>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>

/* Typing */
const text = "Hey Sonali 💖, something special is waiting for you...";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}
typing();

/* Start */
function start(){
  document.getElementById("welcome").style.display="none";
  document.getElementById("main").style.display="block";

  let music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let fade = setInterval(()=>{
    if(music.volume < 0.5) music.volume += 0.02;
    else clearInterval(fade);
  },200);

  createParticles();
}

/* Slider */
let index=0;
setInterval(()=>{
  index=(index+1)%3;
  document.getElementById("slider").style.transform=`translateX(-${index*100}%)`;
},3000);

/* Surprise */
function surprise(){
  document.getElementById("surpriseText").style.display="block";

  confetti({ particleCount:200, spread:120, origin:{y:0.6} });

  setTimeout(()=>{
    confetti({ particleCount:150, spread:180, origin:{y:0.3} });
  },400);
}

/* Particles */
function createParticles(){
  setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),8000);
  },300);
}

/* 3D tilt */
const card = document.getElementById("card");
card.addEventListener("mousemove",(e)=>{
  let x=e.offsetX;
  let y=e.offsetY;
  card.style.transform=`rotateX(${y/15}deg) rotateY(${x/-15}deg)`;
});
card.addEventListener("mouseleave",()=>{
  card.style.transform="rotateX(0) rotateY(0)";
});

</script>

</body>
</html>
